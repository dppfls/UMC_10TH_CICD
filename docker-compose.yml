services:
  app:
    image: dppfls/umc-10th-cicd:latest
    container_name: spring-app
    env_file:
      - .env
    expose:
      - "8080"
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - app
    restart: always