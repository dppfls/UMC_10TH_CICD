name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: main 체크아웃
        uses: actions/checkout@v4

      - name: 자바 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Gradle 빌드
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      - name: Docker Hub 로그인
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Docker 이미지 빌드 및 Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/umc-10th-cicd:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/umc-10th-cicd:latest

      - name: EC2 배포
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          ENV: ${{ secrets.ENV }}
        run: |
          echo "$EC2_SSH_KEY" > private_key.pem
          chmod 600 private_key.pem

          ssh -i private_key.pem -o StrictHostKeyChecking=no $EC2_USERNAME@$EC2_HOST "mkdir -p ~/app/nginx"

          scp -i private_key.pem -o StrictHostKeyChecking=no docker-compose.yml $EC2_USERNAME@$EC2_HOST:~/app/docker-compose.yml
          scp -i private_key.pem -o StrictHostKeyChecking=no nginx/default.conf $EC2_USERNAME@$EC2_HOST:~/app/nginx/default.conf

          echo "$ENV" | ssh -i private_key.pem -o StrictHostKeyChecking=no $EC2_USERNAME@$EC2_HOST "cat > ~/app/.env"

          ssh -i private_key.pem -o StrictHostKeyChecking=no $EC2_USERNAME@$EC2_HOST "
            cd ~/app
            docker-compose down
            docker-compose pull
            docker-compose up -d
          "

          rm -f private_key.pem